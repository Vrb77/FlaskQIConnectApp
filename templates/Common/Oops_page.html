<html>
<head>

<style>

}

.bottom-left {

  bottom: 25vh;
  left: 15vw;
}

<body>

{% if session['userType']=="vendor" %}
<div class="w3-display-container"> 
    <h1>This is Vendor Account</h1>    
    <button class="w3-btn w3-round-xxlarge w3-green"><a href="/vendor_home">Go to home</a></button>
</div>
{% endif %}
